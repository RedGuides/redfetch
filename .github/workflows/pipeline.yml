# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Publish

on:
  push:
    branches:
      - 'develop'
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for PyPI Trusted Publishing

jobs:
  build-and-publish-python:
    runs-on: ubuntu-latest
    outputs:
      package-version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Ensure full Git history is available for versioning
          fetch-tags: true

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Set Environment Variables
        run: |
          if [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "REDFETCH_BASE_URL=https://www.redguides.com/devtestbaby" >> $GITHUB_ENV
            # NOTE: to update an .exe that's pre-release, as we do on develop, PYAPP requires you to pass --pre:
            #   .\redfetch.exe self update --pre
          fi

      - name: Install Hatch
        uses: pypa/hatch@install

      - name: Run Tests
        run: |
          hatch test

      - name: Clean workspace (remove test artifacts)
        run: |
          git clean -xfd

      - name: Build Package
        run: |
          hatch build

      - name: Upload Python distribution
        if: github.ref == 'refs/heads/develop'
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(hatch version)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Set version to: ${VERSION}"

      - name: Publish to TestPyPI
        if: github.ref == 'refs/heads/develop'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1

  build-and-publish-exe:
    needs: build-and-publish-python
    if: needs.build-and-publish-python.result == 'success'
    runs-on: windows-latest
    outputs:
      project-version: ${{ steps.set_version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Ensure full Git history is available for versioning

      - name: Download Python distribution
        if: github.ref == 'refs/heads/develop'
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist

      - name: Set Environment Variables
        id: set_env_vars
        shell: pwsh
        run: |
          "PYAPP_EXEC_SCRIPT=$env:GITHUB_WORKSPACE\pyapp_launcher.py" >> $env:GITHUB_ENV
          "PYAPP_PASS_LOCATION=1" >> $env:GITHUB_ENV

          if ($env:GITHUB_REF -eq 'refs/heads/develop') {
            "PYAPP_EMBED_WHEEL=1" >> $env:GITHUB_ENV
          } else {
            "PYAPP_PROJECT_NAME=redfetch" >> $env:GITHUB_ENV
          }
          "PYAPP_PIP_EXTRA_ARGS=" >> $env:GITHUB_ENV

          # Output the values for verification
          Get-Content $env:GITHUB_ENV

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Hatch
        run: pip install hatch

      - name: Set PYAPP_PROJECT_VERSION
        id: set_version
        run: |
          $version = "${{ needs.build-and-publish-python.outputs.package-version }}"
          echo "Setting version to: $version"
          "PYAPP_PROJECT_VERSION=$version" >> $env:GITHUB_ENV
          "version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Set Up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install 7-Zip
        run: choco install 7zip --no-progress -y

      - name: Download PyApp Source
        shell: pwsh
        run: |
          Invoke-WebRequest https://github.com/ofek/pyapp/releases/latest/download/source.zip -OutFile pyapp-source.zip
          7z x pyapp-source.zip -o"./pyapp-source"
          $dir = Get-ChildItem -Path .\pyapp-source\ -Directory | Select-Object -First 1
          Move-Item -Path $dir.FullName -Destination pyapp-latest

      - name: Build PyApp Executable
        run: |
          if ($env:PYAPP_EMBED_WHEEL -eq '1') {
            # Develop embeds the built wheel so its deps resolve from PyPI rather than TestPyPI
            $wheel = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\dist\*.whl" | Select-Object -First 1
            if (-not $wheel) { throw "No redfetch wheel found in dist/" }
            $env:PYAPP_PROJECT_PATH = $wheel.FullName
            Remove-Item Env:PYAPP_PROJECT_NAME -ErrorAction SilentlyContinue
            Remove-Item Env:PYAPP_PROJECT_VERSION -ErrorAction SilentlyContinue
          }

          $env:PYAPP_EXEC_SCRIPT = "${{ env.PYAPP_EXEC_SCRIPT }}"
          $env:PYAPP_PASS_LOCATION = "${{ env.PYAPP_PASS_LOCATION }}"
          $env:PYAPP_PIP_EXTRA_ARGS = "${{ env.PYAPP_PIP_EXTRA_ARGS }}"

          Write-Host "PYAPP_EXEC_SCRIPT: $env:PYAPP_EXEC_SCRIPT"
          Write-Host "PYAPP_PASS_LOCATION: $env:PYAPP_PASS_LOCATION"
          Write-Host "PYAPP_PIP_EXTRA_ARGS: $env:PYAPP_PIP_EXTRA_ARGS"

          cargo build --release
        working-directory: .\pyapp-latest
        shell: pwsh

      - name: Rename and Move Executable
        shell: pwsh
        run: |
          Move-Item .\pyapp-latest\target\release\pyapp.exe redfetch.exe

      - name: Download rcedit
        shell: pwsh
        run: |
          Invoke-WebRequest https://github.com/electron/rcedit/releases/latest/download/rcedit-x64.exe -OutFile rcedit.exe

      - name: Modify Executable Properties
        shell: pwsh
        run: |
          .\rcedit.exe redfetch.exe `
            --set-version-string "ProductName" "redfetch" `
            --set-version-string "FileDescription" "Download and publish EverQuest scripts and software using the RedGuides API" `
            --set-file-version "${{ env.PYAPP_PROJECT_VERSION }}" `
            --set-product-version "${{ env.PYAPP_PROJECT_VERSION }}" `
            --set-version-string "LegalCopyright" "© RedGuides, LLC" `
            --set-version-string "OriginalFilename" "redfetch.exe" `
            --set-version-string "InternalName" "redfetch" `
            --set-icon "redfetch.ico"

      - name: Install Google Cloud KMS CNG Provider
        shell: pwsh
        run: |
          if (Test-Path "$env:SystemRoot\System32\kmscng.dll") {
            Write-Host "kmscng already installed."
            return
          }
          $url = "https://github.com/GoogleCloudPlatform/kms-integrations/releases/download/cng-v1.3/kmscng-1.3-windows-amd64.zip"
          $zip = Join-Path $env:RUNNER_TEMP "kmscng.zip"
          $dest = Join-Path $env:RUNNER_TEMP "kmscng"
          Invoke-WebRequest $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          $msi = Get-ChildItem -Path $dest -Recurse -Filter *.msi | Select-Object -First 1
          if (-not $msi) { throw "kmscng MSI not found in archive" }
          Start-Process msiexec.exe -ArgumentList "/i `"$($msi.FullName)`" /qn /norestart" -Wait -NoNewWindow
          if (-not (Test-Path "$env:SystemRoot\System32\kmscng.dll")) { throw "kmscng installation failed" }
          Write-Host "kmscng installed."

      - name: Sign Executable
        shell: pwsh
        env:
          KMS_KEY: projects/code-signing-rg/locations/global/keyRings/redkeys/cryptoKeys/rgkey/cryptoKeyVersions/1
          SIGNING_CERT: ${{ secrets.SIGNING_CERT }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          $CertFile = Join-Path $env:RUNNER_TEMP "user.crt"
          $KeyFile  = Join-Path $env:RUNNER_TEMP "gcp-sa.json"
          [IO.File]::WriteAllBytes($CertFile, [Convert]::FromBase64String($env:SIGNING_CERT))
          [IO.File]::WriteAllText($KeyFile, $env:GCP_SA_KEY)
          $env:GOOGLE_APPLICATION_CREDENTIALS = $KeyFile

          $signtool = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "\\x64\\" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) { throw "signtool.exe not found" }
          Write-Host "Using signtool: $signtool"

          $tsaServers = @('http://timestamp.digicert.com', 'http://timestamp.sectigo.com')
          $maxAttempts = 5
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            $tsa = $tsaServers[($attempt - 1) % $tsaServers.Count]
            & $signtool sign /fd SHA256 /f $CertFile /csp "Google Cloud KMS Provider" /kc $env:KMS_KEY /tr $tsa /td sha256 /v redfetch.exe
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -eq $maxAttempts) { throw "Signing failed after $maxAttempts attempts" }
            Start-Sleep -Seconds 2
          }
          & $signtool verify /pa /v redfetch.exe

          Remove-Item -Force $CertFile, $KeyFile

      - name: Upload Executable Artifact
        uses: actions/upload-artifact@v7
        with:
          name: redfetch.exe
          path: redfetch.exe

  publish-to-redguides:
    needs: build-and-publish-exe
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Download Executable Artifact
        uses: actions/download-artifact@v8
        with:
          name: redfetch.exe
      - name: Redguides Publish
        uses: RedGuides/redguides-publish@v1
        env:
          REDGUIDES_API_KEY: ${{ secrets.REDGUIDES_API_KEY }}
        with:
          resource_id: '3177'
          description: 'README.md'
          version: ${{ needs.build-and-publish-exe.outputs.project-version }}
          message: 'CHANGELOG.md'
          file: 'redfetch.exe'
          domain: 'https://raw.githubusercontent.com/RedGuides/redfetch/main/'
